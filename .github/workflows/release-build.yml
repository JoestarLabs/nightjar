name: "Manual Release Build"

permissions:
  contents: write
  packages: write

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g., v1.0.0)"
        required: true
        type: string

env:
  APP_NAME: nightjar

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set release version env
        run: echo "RELEASE_VERSION=${{ github.event.inputs.tag }}" >> $GITHUB_ENV

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      # ── Decode the base64 keystore from GitHub Secrets ────────────────────
      # To set up:
      #   1. Generate your keystore (see keystore/README.md)
      #   2. base64 -w 0 nightjar.keystore > nightjar.keystore.b64
      #   3. Add contents to GitHub Secret: SIGNING_KEYSTORE
      #   4. Add the other three secrets: SIGNING_KEYSTORE_PASSWORD,
      #      SIGNING_KEY_ALIAS, SIGNING_KEY_PASSWORD
      - name: Decode keystore
        run: |
          echo "${{ secrets.SIGNING_KEYSTORE }}" | base64 --decode > /tmp/nightjar.keystore
          echo "SIGNING_KEYSTORE_PATH=/tmp/nightjar.keystore" >> $GITHUB_ENV

      - name: Build release APK
        env:
          SIGNING_KEYSTORE_PATH: /tmp/nightjar.keystore
          SIGNING_KEYSTORE_PASSWORD: ${{ secrets.SIGNING_KEYSTORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: ./gradlew assembleRelease

      - name: Sign APK (secondary verification)
        id: sign_apk
        uses: ilharp/sign-android-release@v2
        with:
          releaseDir: app/build/outputs/apk/release
          signingKey: ${{ secrets.SIGNING_KEYSTORE }}
          keyStorePassword: ${{ secrets.SIGNING_KEYSTORE_PASSWORD }}
          keyAlias: ${{ secrets.SIGNING_KEY_ALIAS }}
          keyPassword: ${{ secrets.SIGNING_KEY_PASSWORD }}

      - name: Rename signed APK
        run: mv ${{ steps.sign_apk.outputs.signedFile }} ${{ env.APP_NAME }}-release-${{ env.RELEASE_VERSION }}.apk

      - name: Create GitHub Release and upload APK
        uses: "mathieucarbou/marvinpinto-action-automatic-releases@latest"
        with:
          # Built-in GITHUB_TOKEN is sufficient for creating releases in the same repo.
          # No PAT required.
          repo_token: "${{ secrets.GITHUB_TOKEN }}"
          automatic_release_tag: ${{ github.event.inputs.tag }}
          prerelease: false
          title: "Nightjar ${{ github.event.inputs.tag }}"
          files: ${{ env.APP_NAME }}-release-${{ env.RELEASE_VERSION }}.apk

      - name: VirusTotal Scan
        id: vt
        uses: crazy-max/ghaction-virustotal@v5
        with:
          vt_api_key: ${{ secrets.VT_API_KEY }}
          files: |
            ${{ env.APP_NAME }}-release-${{ env.RELEASE_VERSION }}.apk

      - name: Update Release Body with Scan Results
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.event.inputs.tag }}"
          CURRENT_BODY=$(gh release view "$TAG" --json body --jq .body)
          VT_LINK="${{ steps.vt.outputs.analysis }}"
          VT_URL=$(echo "$VT_LINK" | cut -d'=' -f2-)
          NEW_BODY=$(printf "%s\n\n## Security Scan\n* [VirusTotal Analysis](%s)\n" "$CURRENT_BODY" "$VT_URL")
          gh release edit "$TAG" --notes "$NEW_BODY"

      - name: Clean up keystore
        if: always()
        run: rm -f /tmp/nightjar.keystore
