name: Release Please (Automated)

on:
  push:
    branches:
      - master

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.app--release_created }}
      tag_name: ${{ steps.release.outputs.app--tag_name }}
      version: ${{ steps.release.outputs.app--version }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  build-and-release:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: gradle

      - name: Update Android version
        run: |
          VERSION="${{ needs.release-please.outputs.version }}"
          VERSION_CODE=$(date +%s)

          # Update versionName and versionCode in build.gradle.kts
          sed -i "s/versionName = \".*\"/versionName = \"$VERSION\"/" app/build.gradle.kts
          sed -i "s/versionCode = [0-9]*/versionCode = $VERSION_CODE/" app/build.gradle.kts

      - name: Build unsigned Release APK
        run: ./gradlew assembleRelease

      - name: Sign APK
        id: sign_apk
        uses: ilharp/sign-android-release@v2
        with:
          releaseDir: app/build/outputs/apk/release
          signingKey: ${{ secrets.SIGNING_KEYSTORE }}
          keyStorePassword: ${{ secrets.SIGNING_KEYSTORE_PASSWORD }}
          keyAlias: ${{ secrets.SIGNING_KEY_ALIAS }}
          keyPassword: ${{ secrets.SIGNING_KEY_PASSWORD }}

      - name: Rename APK
        run: |
          mv ${{ steps.sign_apk.outputs.signedFile }} nightjar-${{ needs.release-please.outputs.version }}.apk

      - name: Upload Release Asset
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ needs.release-please.outputs.tag_name }} nightjar-${{ needs.release-please.outputs.version }}.apk

      - name: VirusTotal Scan
        id: vt
        uses: crazy-max/ghaction-virustotal@v5
        with:
          vt_api_key: ${{ secrets.VT_API_KEY }}
          files: |
            nightjar-${{ needs.release-please.outputs.version }}.apk

      - name: Update Release Body with Scan Results
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ needs.release-please.outputs.tag_name }}"
          CURRENT_BODY=$(gh release view "$TAG" --json body --jq .body)
          VT_LINK="${{ steps.vt.outputs.analysis }}"
          VT_URL=$(echo "$VT_LINK" | cut -d'=' -f2-)
          NEW_BODY=$(printf "%s\n\n## Security Scan\n* [VirusTotal Analysis](%s)\n" "$CURRENT_BODY" "$VT_URL")
          gh release edit "$TAG" --notes "$NEW_BODY"
