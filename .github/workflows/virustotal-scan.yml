name: "VirusTotal Scan Release Assets"

permissions:
  contents: write

on:
  release:
    types:
      - published

jobs:
  virustotal:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # Allow time for GitHub to propagate the release asset CDN links
      - name: Wait for Asset Availability
        run: |
          echo "Waiting for APK asset to be available on GitHub CDN…"
          sleep 240

      - name: VirusTotal Scan
        uses: crazy-max/ghaction-virustotal@v4
        with:
          vt_api_key: ${{ secrets.VT_API_KEY }}
          update_release_body: true
          # Match any .apk file attached to the release
          files: |
            .apk$
